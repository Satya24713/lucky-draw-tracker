<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Draw Tracker</title>
    <style>
        /* Claude/ChatGPT Inspired Minimalist Theme Settings */
        :root {
            --bg-color: #fcfbfa; /* Warm off-white background */
            --card-bg: #ffffff;
            --primary: #d97706; /* Warm clay/amber primary accent */
            --primary-light: #fef3c7;
            --text-main: #1f2937; /* Dark slate */
            --text-muted: #6b7280;
            --border: #f3f4f6; /* Soft border divider */
            --border-hover: #e5e7eb;
            --success: #10b981;
            --success-light: #ecfdf5;
            --modal-overlay: rgba(31, 41, 55, 0.3);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 30px -10px rgba(0,0,0,0.08);
        }

        body.dark-theme {
            --bg-color: #111110; /* Dark premium charcoal */
            --card-bg: #181817;
            --primary: #f59e0b; /* Amber warning accent */
            --primary-light: #2d200a;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #262624;
            --border-hover: #32322f;
            --success: #34d399;
            --success-light: #064e3b;
            --modal-overlay: rgba(0, 0, 0, 0.6);
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow-md: 0 10px 30px -10px rgba(0,0,0,0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            transition: background-color 0.2s, color 0.2s;
        }

        /* Minimalist Outer Container Card */
        .app-container {
            width: 100%;
            max-width: 390px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Top Header Control Options */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Instant Language Pill Switcher */
        .lang-switch-container {
            display: flex;
            background: var(--border);
            padding: 2px;
            border-radius: 8px;
            cursor: pointer;
            user-select: none;
            font-size: 0.72rem;
            font-weight: 600;
            line-height: 1;
            border: 1px solid var(--border);
        }

        .lang-option {
            padding: 4px 8px;
            border-radius: 6px;
            color: var(--text-muted);
            transition: background-color 0.1s, color 0.1s;
        }

        .lang-option.active {
            background-color: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        .theme-toggle-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px;
            border-radius: 8px;
            transition: color 0.2s;
        }

        .theme-toggle-btn:hover {
            color: var(--text-main);
        }

        /* Display Panel Info Dashboard (Claude Style) */
        .today-display {
            background: var(--bg-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border);
        }

        .today-left {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 72%;
        }

        .today-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .today-label small {
            font-size: 0.75rem;
            color: var(--text-main);
            font-weight: 600;
        }

        .winner-box {
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .winner-box strong {
            color: var(--primary);
            font-weight: 600;
        }

        .today-val {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-main);
            background: var(--card-bg);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }

        /* YouTube-style Top Navigation Tabs Bar */
        .tabs-navbar {
            display: flex;
            background: var(--border);
            border-radius: 10px;
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            text-align: center;
            padding: 8px 4px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.15s, color 0.15s;
        }

        .tab-btn.active {
            background-color: var(--card-bg);
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }

        /* Tab Content Panel wrapper */
        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* Search input bar styling */
        .search-bar-container {
            margin-bottom: 12px;
        }

        .search-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .search-input:focus {
            border-color: var(--primary);
        }

        /* Calendar Styling */
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .calendar-nav span {
            font-weight: 600;
            font-size: 0.85rem;
        }

        .calendar-nav button {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            padding: 4px 8px;
        }

        .weekdays-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            margin-bottom: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: default;
            user-select: none;
            position: relative;
        }

        .day-cell.empty {
            visibility: hidden;
        }

        .day-cell.today {
            background-color: var(--border);
        }

        .day-cell.has-number {
            background-color: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
        }

        .day-cell.has-number:hover {
            background-color: var(--primary);
            color: #ffffff;
        }

        /* Forms Layout */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .form-group label {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .form-group input {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.15s;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        /* Participant List rendering */
        .participants-list-scroll {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 280px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .p-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-color);
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .p-left-content {
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 65%;
        }

        .p-index {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            min-width: 18px;
        }

        .p-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            overflow: hidden;
        }

        .p-name {
            font-size: 0.85rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .p-date {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .p-right-content {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .p-badge {
            background: var(--primary-light);
            color: var(--primary);
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1rem;
            padding: 0 4px;
            transition: color 0.15s;
        }

        .delete-btn:hover {
            color: #ef4444;
        }

        .edit-p-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 600;
            margin-right: 4px;
            text-decoration: underline;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--modal-overlay);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            padding: 16px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 350px;
            border-radius: 14px;
            padding: 20px;
            box-shadow: var(--shadow-md);
            transform: translateY(12px);
            transition: transform 0.2s ease;
            border: 1px solid var(--border);
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .modal-close-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.25rem;
            cursor: pointer;
            line-height: 1;
        }

        /* Utilities */
        .sync-text {
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-muted);
        }

        .sync-link {
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.7rem;
        }

        .pop-number {
            width: 60px;
            height: 60px;
            background-color: var(--success-light);
            color: var(--success);
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            margin: 12px auto;
        }

        .pop-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1 data-i18n="appTitle">Lucky Draw Tracker</h1>
        <div class="header-controls">
            <!-- Language Pill Toggle Switch -->
            <div class="lang-switch-container" id="langSwitchBtn">
                <div class="lang-option" id="langOptionHi">हिन्दी</div>
                <div class="lang-option" id="langOptionEn">EN</div>
            </div>
            <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle Theme">🌙</button>
        </div>
    </header>

    <!-- Top Display Dashboard Banner (Today's Data) -->
    <div class="today-display">
        <div class="today-left">
            <div class="today-label">
                <span data-i18n="todaysNumber">Today's Number</span>
                <small id="todayFriendlyDate">--</small>
            </div>
            <div class="winner-box">
                🏆 <span data-i18n="winnerPrefix" style="margin-right:2px;">Winner:</span> <strong id="winnerNameDisplay">Satya Vishwakarma</strong>
            </div>
        </div>
        <div class="today-val" id="todayValDisplay">--</div>
    </div>

    <!-- YouTube-style Nav Menu Bar (Switches views instantly) -->
    <div class="tabs-navbar">
        <button class="tab-btn active" id="tabCalendarBtn" onclick="switchTab('tabCalendar')">📅 <span data-i18n="tabCalShort">C</span></button>
        <button class="tab-btn" id="tabRegistryBtn" onclick="switchTab('tabRegistry')">👥 <span data-i18n="tabRegShort">List</span></button>
        <button class="tab-btn" id="tabAdminBtn" onclick="switchTab('tabAdmin')">🔑 <span data-i18n="tabAdminShort">Admin</span></button>
    </div>

    <!-- TAB PANEL 1: CALENDAR VIEW -->
    <div class="tab-panel active" id="tabCalendar">
        <div class="calendar-nav">
            <button id="prevMonth">&larr;</button>
            <span id="monthYearTitle">June 2026</span>
            <button id="nextMonth">&rarr;</button>
        </div>
        <div class="weekdays-grid">
            <div data-i18n="daySu">S</div>
            <div data-i18n="dayMo">M</div>
            <div data-i18n="dayTu">T</div>
            <div data-i18n="dayWe">W</div>
            <div data-i18n="dayTh">T</div>
            <div data-i18n="dayFr">F</div>
            <div data-i18n="daySa">S</div>
        </div>
        <div class="days-grid" id="daysContainer"></div>
    </div>

    <!-- TAB PANEL 2: NORMAL VIEW-ONLY PARTICIPANT REGISTRY -->
    <div class="tab-panel" id="tabRegistry">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span style="font-size:0.85rem; font-weight:700;" data-i18n="listTitle">Active Registry</span>
            <span class="modal-badge-count" id="badgeCountLabel">0</span>
        </div>
        <!-- Universal Case-Insensitive Search Bar -->
        <div class="search-bar-container">
            <input type="text" class="search-input" id="normalSearchInput" placeholder="Search by name / खोजें...">
        </div>
        <div class="participants-list-scroll" id="pListContainer">
            <!-- Programmatic Insertion -->
        </div>
    </div>

    <!-- TAB PANEL 3: SECURE ADMIN CONSOLE -->
    <div class="tab-panel" id="tabAdmin">
        <!-- Login Card (Displays if Admin is unauthorized) -->
        <div id="adminLoginView">
            <div style="background-color: var(--bg-color); padding: 16px; border-radius: 12px; border: 1px solid var(--border);">
                <div style="font-size:0.95rem; font-weight:700; margin-bottom:14px; text-align:center;" data-i18n="adminLoginTitle">Admin Login</div>
                <div class="form-group">
                    <label data-i18n="labelAdminId">Admin ID</label>
                    <input type="text" id="adminIdInput" placeholder="ADMIN">
                </div>
                <div class="form-group">
                    <label data-i18n="labelAdminPass">Password</label>
                    <input type="password" id="adminPassInput" placeholder="ADMIN123">
                </div>
                <button class="btn btn-primary" id="submitLoginBtn" style="margin-top:4px;" data-i18n="btnLoginSubmit">Login</button>
            </div>
        </div>

        <!-- Dashboard (Displays if Admin is logged in) -->
        <div id="adminDashboardView" style="display: none;">
            
            <!-- Credentials Update Box -->
            <details style="background-color: var(--bg-color); padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px;">
                <summary style="font-size:0.75rem; font-weight:700; cursor:pointer;" data-i18n="titleCredUpdate">Change Password / Credentials</summary>
                <div style="margin-top: 10px; display:flex; flex-direction:column; gap:8px;">
                    <input type="text" class="search-input" style="padding: 6px 10px;" id="newAdminIdInput" placeholder="New Admin ID">
                    <input type="password" class="search-input" style="padding: 6px 10px;" id="newAdminPassInput" placeholder="New Password">
                    <button class="btn btn-secondary" id="saveCredentialsBtn" style="padding: 6px; font-size:0.75rem;" data-i18n="btnSave">Save</button>
                </div>
            </details>

            <!-- Add Participant Section with Calendar Date-Picker -->
            <div style="background-color: var(--bg-color); padding: 12px; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--border);">
                <div style="font-size:0.8rem; font-weight:700; margin-bottom:10px;" data-i18n="addTitle">Add New Participant</div>
                <div class="form-group">
                    <input type="text" id="adminAddName" placeholder="Enter Name">
                </div>
                <div class="form-group">
                    <input type="number" id="adminAddNumber" min="10" max="99" placeholder="Lucky Number (10-99)">
                </div>
                <div class="form-group">
                    <label style="font-size:0.7rem; color:var(--text-muted);" data-i18n="labelDate">Participation Date</label>
                    <!-- Pop-Up Calendar Picker -->
                    <input type="datetime-local" id="adminAddDatePicker">
                </div>
                <button class="btn btn-primary" id="adminAddSubmitBtn" style="padding: 6px 12px;" data-i18n="btnSubmit">Add</button>
            </div>

            <!-- Manage section with Search bar -->
            <div class="search-bar-container">
                <input type="text" class="search-input" id="adminSearchInput" placeholder="Search / खोजें...">
            </div>

            <div class="participants-list-scroll" id="adminPListContainer">
                <!-- Javascript updates -->
            </div>

            <button class="btn btn-outline" id="adminLogoutBtn" style="margin-top: 14px; color: #ef4444; border-color: rgba(239, 68, 68, 0.2);" data-i18n="btnLogout">Logout</button>
        </div>
    </div>

    <!-- Sync Details -->
    <div class="sync-text">
        <button class="sync-link" id="forceGenerateBtn" data-i18n="btnSync">Force check daily sync</button>
    </div>
</div>

<!-- MODAL: ADMIN EDIT PARTICIPANT WITH POP-UP CALENDAR PICKER -->
<div class="modal-overlay" id="adminEditModal">
    <div class="modal-card">
        <div class="modal-header">
            <span class="modal-title" data-i18n="editTitle">Edit Participant</span>
            <button class="modal-close-btn" onclick="closeModal('adminEditModal')">&times;</button>
        </div>
        <div class="form-group">
            <label for="adminEditName" data-i18n="labelName">Name</label>
            <input type="text" id="adminEditName">
        </div>
        <div class="form-group">
            <label for="adminEditNumber" data-i18n="labelNumber">Lucky Number (10-99)</label>
            <input type="number" id="adminEditNumber" min="10" max="99">
        </div>
        <div class="form-group">
            <label for="adminEditDatePicker" data-i18n="labelDate">Participation Date</label>
            <!-- Pop-up Calendar Picker inside edit modal -->
            <input type="datetime-local" id="adminEditDatePicker">
        </div>
        <button class="btn btn-primary" id="adminSaveEditBtn" data-i18n="btnSave">Save changes</button>
    </div>
</div>

<!-- MODAL: HISTORICAL DAY DETAIL VIEW -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-card">
        <div class="modal-header">
            <span class="modal-title" id="modalDate">12 June</span>
            <button class="modal-close-btn" onclick="closeModal('detailModal')">&times;</button>
        </div>
        <div class="pop-number" id="modalNumber">--</div>
        <div class="pop-meta" id="modalMeta">
            <!-- Injection -->
        </div>
    </div>
</div>

<script>
    // Dictionary System for EN and HI locales
    const translations = {
        en: {
            appTitle: "Lucky Draw Tracker",
            todaysNumber: "Today's Number",
            winnerPrefix: "Winner:",
            btnSync: "Force check daily sync",
            calendarTitle: "Calendar View",
            addTitle: "Add New Participant",
            labelName: "Participant Name",
            labelNumber: "Lucky Number (10-99)",
            labelDate: "Participation Date",
            btnSubmit: "Add Participant",
            listTitle: "Registry Database",
            daySu: "S", dayMo: "M", dayTu: "T", dayWe: "W", dayTh: "T", dayFr: "F", daySa: "S",
            pending: "Pending",
            noParticipants: "No registered participants found.",
            emptyNameErr: "Please enter a valid participant name.",
            numErr: "Number must be a value between 10 and 99.",
            successAdd: "Registered successfully!",
            genAt: "Generated at",
            dailyLimit: "Daily target range:",
            winnerLabel: "Winner",
            addedOn: "Added on",
            adminLoginTitle: "Admin Portal Login",
            labelAdminId: "Admin ID",
            labelAdminPass: "Password",
            btnLoginSubmit: "Login",
            adminPanelTitle: "Admin Panel Dashboard",
            btnLogout: "Logout",
            editTitle: "Edit Participant Details",
            btnSave: "Save changes",
            loginSuccess: "Logged in successfully!",
            loginFail: "Invalid ID or Password!",
            tabCalShort: "C",
            tabRegShort: "Participants",
            tabAdminShort: "Admin",
            titleCredUpdate: "Change Credentials",
            credSuccess: "Credentials saved successfully!"
        },
        hi: {
            appTitle: "लकी ड्रा ट्रैकर",
            todaysNumber: "आज का नंबर",
            winnerPrefix: "विजेता:",
            btnSync: "दैनिक सिंक की जांच करें",
            calendarTitle: "कैलेंडर दृश्य",
            addTitle: "नया प्रतिभागी जोड़ें",
            labelName: "प्रतिभागी का नाम",
            labelNumber: "लकी नंबर (10-99)",
            labelDate: "भागीदारी की तारीख",
            btnSubmit: "प्रतिभागी दर्ज करें",

    let participants = JSON.parse(localStorage.getItem('cal_generator_participants'));
    if (!participants || participants.length === 0) {
        participants = defaultSeededParticipants;

    // Editing State
    let editingParticipantId = null;

    // Elements
    const langSwitchBtn = document.getElementById('langSwitchBtn');
    const langOptionHi = document.getElementById('langOptionHi');

    const daysContainer = document.getElementById('daysContainer');
    
    // Normal List DOM
    const pListContainer = document.getElementById('pListContainer');
    const badgeCountLabel = document.getElementById('badgeCountLabel');
    const normalSearchInput = document.getElementById('normalSearchInput');

    // Admin Dashboard Views
    const adminLoginView = document.getElementById('adminLoginView');
    const adminDashboardView = document.getElementById('adminDashboardView');

    // Admin Auth Credentials Inputs
    const adminIdInput = document.getElementById('adminIdInput');
    const adminPassInput = document.getElementById('adminPassInput');
    const submitLoginBtn = document.getElementById('submitLoginBtn');

    // Admin Credentials Update Form
    const newAdminIdInput = document.getElementById('newAdminIdInput');
    const newAdminPassInput = document.getElementById('newAdminPassInput');
    const saveCredentialsBtn = document.getElementById('saveCredentialsBtn');

    // Admin List/Portal DOM
    const adminPListContainer = document.getElementById('adminPListContainer');
    const adminSearchInput = document.getElementById('adminSearchInput');

    // Admin Add Form DOM (DateTimePicker implemented)
    const adminAddName = document.getElementById('adminAddName');
    const adminAddNumber = document.getElementById('adminAddNumber');
    const adminAddDatePicker = document.getElementById('adminAddDatePicker');
    const adminAddSubmitBtn = document.getElementById('adminAddSubmitBtn');

    // Admin Edit Form DOM (DateTimePicker implemented)
    const adminEditName = document.getElementById('adminEditName');
    const adminEditNumber = document.getElementById('adminEditNumber');
    const adminEditDatePicker = document.getElementById('adminEditDatePicker');
    const adminSaveEditBtn = document.getElementById('adminSaveEditBtn');

    const MONTHS_EN = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    const MONTHS_HI = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];

    // Initialize Theme
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-theme');
        themeToggleBtn.textContent = '☀️';
    }

    themeToggleBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        themeToggleBtn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    });

    // YouTube-style Tabs Swapper
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-panel').forEach(panel => {
            panel.classList.remove('active');
        });
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        document.getElementById(tabId).classList.add('active');
        document.getElementById(tabId + 'Btn').classList.add('active');

        // Render appropriate views
        if (tabId === 'tabCalendar') renderCalendar();
        if (tabId === 'tabRegistry') renderParticipants();
        if (tabId === 'tabAdmin') {
            checkAdminSession();
            renderAdminParticipants();
        }
    };

    // Translation Applier
    function applyLocalization(lang) {
        currentLocale = lang;
        localStorage.setItem('locale', lang);

        if (lang === 'hi') {
            langOptionHi.classList.add('active');
            langOptionEn.classList.remove('active');
        } else {
            langOptionEn.classList.add('active');
            langOptionHi.classList.remove('active');
        }

        document.querySelectorAll('[data-i18n]').forEach(elem => {
            const key = elem.getAttribute('data-i18n');
            if (translations[lang][key]) {
                elem.textContent = translations[lang][key];
            }
        });

        updateTopDisplay();
        renderCalendar();
        renderParticipants();
        renderAdminParticipants();
    }

    langSwitchBtn.addEventListener('click', () => {
        const nextLang = (currentLocale === 'hi') ? 'en' : 'hi';
        applyLocalization(nextLang);
    });

    // Date/Time Format Helpers
    function getFriendlyDate(dateObj) {
        const day = dateObj.getDate();
        const monthList = currentLocale === 'hi' ? MONTHS_HI : MONTHS_EN;
        const monthName = monthList[dateObj.getMonth()];
        return `${day} ${monthName}`;
    }

    function getLocalDateString(date) {
        const offset = date.getTimezoneOffset();
        const adjustedDate = new Date(date.getTime() - (offset * 60 * 1000));
        return adjustedDate.toISOString().split('T')[0];
    }

    // Dynamic timestamping formatting for calendar picker results
    function generateFullTimestamp(dateObj) {
        const day = dateObj.getDate();
        const monthList = currentLocale === 'hi' ? MONTHS_HI : MONTHS_EN;
        const monthName = monthList[dateObj.getMonth()];
        
        let hours = dateObj.getHours();
        let minutes = dateObj.getMinutes();
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        
        return `${day} ${monthName}, ${hours}:${minutes} ${ampm}`;
    }

    // Core Number Generator Action
    function generateDailyValue(targetDate) {
        const dateStr = getLocalDateString(targetDate);
        
        if (historyData.some(item => item.date === dateStr)) return;

        const maxLimit = Math.floor(Math.random() * (99 - 10 + 1)) + 10;
        const finalNum = Math.floor(Math.random() * (maxLimit - 10 + 1)) + 10;

        const record = {
            date: dateStr,
            value: finalNum,
            maxLimit: maxLimit,
            timestamp: "06:00 AM"
        };

        historyData.push(record);
        localStorage.setItem('cal_generator_history', JSON.stringify(historyData));
    }

    // Sync state controller
    function runBackendSync() {
        const now = new Date();
        const todayStr = getLocalDateString(now);
        const targetHour = 6; 

        if (now.getHours() >= targetHour) {
            const hasToday = historyData.some(item => item.date === todayStr);
            if (!hasToday) {
                generateDailyValue(now);
            }
        } else {
            const yesterday = new Date(now);
            yesterday.setDate(now.getDate() - 1);
            const yesterdayStr = getLocalDateString(yesterday);
            const hasYesterday = historyData.some(item => item.date === yesterdayStr);
            if (!hasYesterday) {
                generateDailyValue(yesterday);
            }
        }
        
        updateTopDisplay();
        renderCalendar();
    }

    // UI Updates
    function updateTopDisplay() {
        const now = new Date();
        const todayStr = getLocalDateString(now);
        const todayRecord = historyData.find(item => item.date === todayStr);
        
        if (todayRecord) {
            const todayValue = todayRecord.value;
            todayValDisplay.textContent = todayValue;
            todayFriendlyDate.textContent = getFriendlyDate(now);

            // Compute Winners
            const matches = participants.filter(p => Number(p.number) === Number(todayValue));
            if (matches.length > 0) {
                winnerNameDisplay.textContent = matches.map(p => p.name).join(', ');
            } else {
                winnerNameDisplay.textContent = "Satya Vishwakarma";
            }
        } else {
            todayValDisplay.textContent = "--";
            todayFriendlyDate.textContent = `${getFriendlyDate(now)} (${translations[currentLocale].pending})`;
            winnerNameDisplay.textContent = "Satya Vishwakarma";
        }
    }

    // Render Calendar Structure
    function renderCalendar() {
        const year = currentCalDate.getFullYear();
        const month = currentCalDate.getMonth();

        const monthList = currentLocale === 'hi' ? MONTHS_HI : MONTHS_EN;
        monthYearTitle.textContent = `${monthList[month]} ${year}`;
        daysContainer.innerHTML = '';

        const firstDayIndex = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstDayIndex; i++) {
            const emptyCell = document.createElement('div');
            emptyCell.className = 'day-cell empty';
            daysContainer.appendChild(emptyCell);
        }

        const todayStr = getLocalDateString(new Date());

        for (let day = 1; day <= totalDays; day++) {
            const loopDate = new Date(year, month, day);
            const dateStr = getLocalDateString(loopDate);

            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.textContent = day;

            if (dateStr === todayStr) {
                cell.classList.add('today');
            }

            const record = historyData.find(item => item.date === dateStr);
            if (record) {
                cell.classList.add('has-number');
                cell.addEventListener('click', () => {
                    openHistoryDetail(record);
                });
            }

            daysContainer.appendChild(cell);
        }
    }

    // Modal Control Utils
    function openModal(id) {
        document.getElementById(id).classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    // History Modal display details
    function openHistoryDetail(record) {
        const parsedDate = new Date(record.date);
        document.getElementById('modalDate').textContent = getFriendlyDate(parsedDate);
        document.getElementById('modalNumber').textContent = record.value;

        // Retrieve historical winner details
        const matched = participants.filter(p => Number(p.number) === Number(record.value));
        const historyWinner = matched.length > 0 ? matched.map(p => p.name).join(', ') : "Satya Vishwakarma";

        document.getElementById('modalMeta').innerHTML = `
            ${translations[currentLocale].genAt} <strong>${record.timestamp}</strong>.<br>
            ${translations[currentLocale].dailyLimit} 10 - ${record.maxLimit}.<br>
            <div style="margin-top:10px; color:var(--accent); font-weight:600;">🏆 ${translations[currentLocale].winnerLabel}: ${historyWinner}</div>
        `;
        openModal('detailModal');
    }

    // Render Participant Registry with Case-Insensitive Search (Protects blank spaces)
    function renderParticipants() {
        pListContainer.innerHTML = '';
        badgeCountLabel.textContent = participants.length;

        const filterQuery = normalSearchInput.value.toLowerCase().trim();
        const filteredList = participants.filter(p => p.name.toLowerCase().includes(filterQuery));

        if (filteredList.length === 0) {
            pListContainer.innerHTML = `<div style="color:var(--text-muted); font-size:0.8rem; text-align:center; padding:16px 0;">${translations[currentLocale].noParticipants}</div>`;
            return;
        }

        filteredList.forEach((p, index) => {
            const row = document.createElement('div');
            row.className = 'p-row';
            
            const displayTime = p.timestamp ? p.timestamp : getFriendlyDate(new Date(p.id));

            row.innerHTML = `
                <div class="p-left-content">
                    <span class="p-index">#${index + 1}</span>
                    <div class="p-info">
                        <span class="p-name">${p.name}</span>
                        <span class="p-date">${translations[currentLocale].addedOn} ${displayTime}</span>
                    </div>
                </div>
                <div class="p-right-content">
                    <span class="p-badge">${p.number}</span>
                </div>
            `;
            pListContainer.appendChild(row);
        });
    }

    // Render Admin Participants List with Search, Edit, and Delete options
    function renderAdminParticipants() {
        if (!adminPListContainer) return;
        adminPListContainer.innerHTML = '';
        const filterQuery = adminSearchInput.value.toLowerCase().trim();
        const filteredList = participants.filter(p => p.name.toLowerCase().includes(filterQuery));

        if (filteredList.length === 0) {
            adminPListContainer.innerHTML = `<div style="color:var(--text-muted); font-size:0.8rem; text-align:center; padding:16px 0;">${translations[currentLocale].noParticipants}</div>`;
            return;
        }

        filteredList.forEach((p, index) => {
            const row = document.createElement('div');
            row.className = 'p-row';
            
            const displayTime = p.timestamp ? p.timestamp : getFriendlyDate(new Date(p.id));

            row.innerHTML = `
                <div class="p-left-content">
                    <span class="p-index">#${index + 1}</span>
                    <div class="p-info">
                        <span class="p-name">${p.name}</span>
                        <span class="p-date">${translations[currentLocale].addedOn} ${displayTime}</span>
                    </div>
                </div>
                <div class="p-right-content">
                    <span class="p-badge">${p.number}</span>
                    <button class="edit-p-btn" onclick="openAdminEdit(${p.id})">${translations[currentLocale].btnSave.split(' ')[0]}</button>
                    <button class="delete-btn" onclick="adminDeleteParticipant(${p.id})">&times;</button>
                </div>
            `;
            adminPListContainer.appendChild(row);
        });
    }

    // Delete Logic
    window.adminDeleteParticipant = function(id) {
        participants = participants.filter(p => p.id !== id);
        localStorage.setItem('cal_generator_participants', JSON.stringify(participants));
        renderAdminParticipants();
        updateTopDisplay();
    };

    // Open Edit Modal with pre-loaded date picker context
    window.openAdminEdit = function(id) {
        const participant = participants.find(p => p.id === id);
        if (!participant) return;

        editingParticipantId = id;
        adminEditName.value = participant.name;
        adminEditNumber.value = participant.number;

        // Populate datetime input standard: YYYY-MM-DDThh:mm
        const dateObj = new Date(participant.id);
        const yyyy = dateObj.getFullYear();
        const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
        const dd = String(dateObj.getDate()).padStart(2, '0');
        const hh = String(dateObj.getHours()).padStart(2, '0');
        const min = String(dateObj.getMinutes()).padStart(2, '0');
        adminEditDatePicker.value = `${yyyy}-${mm}-${dd}T${hh}:${min}`;

        openModal('adminEditModal');
    };

    // Save Edit Changes
    adminSaveEditBtn.addEventListener('click', () => {
        const name = adminEditName.value.trim();
        const number = parseInt(adminEditNumber.value, 10);
        const selectedDateTime = adminEditDatePicker.value;

        if (!name) {
            alert(translations[currentLocale].emptyNameErr);
            return;
        }
        if (isNaN(number) || number < 10 || number > 99) {
            alert(translations[currentLocale].numErr);
            return;
        }

        const dateObj = selectedDateTime ? new Date(selectedDateTime) : new Date();
        const formattedTimestamp = generateFullTimestamp(dateObj);

        participants = participants.map(p => {
            if (p.id === editingParticipantId) {
                return {
                    ...p,
                    id: dateObj.getTime(), // Update time signature ID to update chronological location
                    name: name,
                    number: number,
                    timestamp: formattedTimestamp
                };
            }
            return p;
        });

        localStorage.setItem('cal_generator_participants', JSON.stringify(participants));
        closeModal('adminEditModal');
        renderAdminParticipants();
        updateTopDisplay();
    });

    // Admin Add Participant Submit Action
    adminAddSubmitBtn.addEventListener('click', () => {
        const name = adminAddName.value.trim();
        const number = parseInt(adminAddNumber.value, 10);
        const selectedDateTime = adminAddDatePicker.value;

        if (!name) {
            alert(translations[currentLocale].emptyNameErr);
            return;
        }
        if (isNaN(number) || number < 10 || number > 99) {
            alert(translations[currentLocale].numErr);
            return;
        }

        const dateObj = selectedDateTime ? new Date(selectedDateTime) : new Date();
        const formattedTimestamp = generateFullTimestamp(dateObj);

        const newP = {
            id: dateObj.getTime(),
            name: name,
            number: number,
            timestamp: formattedTimestamp
        };

        participants.push(newP);
        localStorage.setItem('cal_generator_participants', JSON.stringify(participants));

        // Form Resets
        adminAddName.value = '';
        adminAddNumber.value = '';
        adminAddDatePicker.value = '';

        renderAdminParticipants();
        updateTopDisplay();
        alert(translations[currentLocale].successAdd);
    });

    // Toggle admin visibility based on sessionStorage
    function checkAdminSession() {
        if (isAdminLoggedIn) {
            adminLoginView.style.display = 'none';
            adminDashboardView.style.display = 'block';
        } else {
            adminLoginView.style.display = 'block';
            adminDashboardView.style.display = 'none';
        }
    }

    // Authenticate Admin Submit
    submitLoginBtn.addEventListener('click', () => {
        const id = adminIdInput.value.trim();
        const pass = adminPassInput.value.trim();

        const savedAdminId = localStorage.getItem('admin_id') || 'ADMIN';
        const savedAdminPass = localStorage.getItem('admin_pass') || 'ADMIN123';

        if (id === savedAdminId && pass === savedAdminPass) {
            isAdminLoggedIn = true;
            sessionStorage.setItem('admin_session', 'true');
            checkAdminSession();
            renderAdminParticipants();
            
            // Clear inputs
            adminIdInput.value = '';
            adminPassInput.value = '';
        } else {
            alert(translations[currentLocale].loginFail);
        }
    });

    // Change Admin Credentials logic
    saveCredentialsBtn.addEventListener('click', () => {
        const newId = newAdminIdInput.value.trim();
        const newPass = newAdminPassInput.value.trim();

        if (!newId || !newPass) {
            alert(currentLocale === 'hi' ? 'कृपया मान्य आईडी और पासवर्ड दर्ज करें।' : 'Please enter a valid ID and Password.');
            return;
        }

        localStorage.setItem('admin_id', newId);
        localStorage.setItem('admin_pass', newPass);

        newAdminIdInput.value = '';
        newAdminPassInput.value = '';

        alert(translations[currentLocale].credSuccess);
    });

    // Admin Logout Logic
    adminLogoutBtn.addEventListener('click', () => {
        isAdminLoggedIn = false;
        sessionStorage.removeItem('admin_session');
        checkAdminSession();
    });

    // Search inputs with instant feedback
    normalSearchInput.addEventListener('input', renderParticipants);
    adminSearchInput.addEventListener('input', renderAdminParticipants);

    // Calendar month offset controls
    document.getElementById('prevMonth').addEventListener('click', () => {
        currentCalDate.setMonth(currentCalDate.getMonth() - 1);
        renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
        currentCalDate.setMonth(currentCalDate.getMonth() + 1);
        renderCalendar();
    });

    document.getElementById('forceGenerateBtn').addEventListener('click', () => {
        runBackendSync();
        alert(currentLocale === 'hi' ? 'दैनिक सिंक की जांच पूरी हुई।' : 'Daily synchronization check completed.');
    });

    // Outer click modal cancellation
    document.querySelectorAll('.modal-overlay').forEach(modal => {
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal(modal.id);
            }
        });
    });

    // Bootstrap app state
    runBackendSync();
    applyLocalization(currentLocale);

    // Hourly routine check sweep
    setInterval(runBackendSync, 3600000);
</script>
